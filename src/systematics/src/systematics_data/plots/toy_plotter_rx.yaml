# This config is meant to specify how plotting of toys should be done
# when running the test for ToyPlotter

general:
  size: [15, 10]
saving:
  plt_dir: null 
correlation:
  size     : [20, 15]
  title    : Correlation matrix 
  annot    : true
  fmt      : '.3f'
  vmin     : -1.0
  vmax     : +1.0
  cmap     : Spectral 
  linewidth: 0.5
  annot_kws:
    size : 12 
  rotation :
    x    : 45
    y    : 45
generated:
  x     : -1 
  label : Generated
  ls    : --
  c     : red
  lw    : 1
pulls:
  binning   : [-4, +4, 60]
  yscale    : 'linear'
  labels    : ['VAR Pull', 'Entries']
  normalized: true
plots:
  Valid:
    binning: [-1, 3, 4]
    yscale: 'linear'
    labels: ['Validity', 'Entries']
    styling:
      Toys:
        histtype : step
        linestyle: '-'
  ee_dt_cmb_N_val:
    binning: [0, 400, 60]
    yscale: 'linear'
    labels: ['$N_{comb}^{ee}$', 'Entries']
  ee_pKst_ee_N_val:
    binning: [0, 400, 60]
    yscale: 'linear'
    labels: ['$N_{pK^*ee}$', 'Entries']
  ee_jpsi_ee_N_val:
    binning: [0, 400, 60]
    yscale: 'linear'
    labels: ['$N_{J/\psi(\to ee)}$', 'Entries']
  ee_dt_sig_mu_val:
    binning: [5600, 5650, 60]
    yscale: 'linear'
    labels: ['$\mu_{signal}^{ee}$', 'Entries']
  mm_dt_cmb_N_val:
    binning: [0, 2000, 60]
    yscale: 'linear'
    labels: ['$N_{comb}^{\mu\mu}$', 'Entries']
  mm_dt_sig_mu_val:
    binning: [5600, 5650, 60]
    yscale: 'linear'
    labels: ['$\mu_{signal}^{\mu\mu}$', 'Entries']
  mm_dt_sig_sg_val:
    binning: [0, 20, 60]
    yscale: 'linear'
    labels: ['$\sigma_{signal}^{\mu\mu}$', 'Entries']
  mm_cmb_c_val:
    binning: [-0.003, -0.002, 60]
    yscale: 'linear'
    labels: ['$c_{comb}^{\mu\mu}$', 'Entries']
  ee_dt_sig_N_val:
    binning: [0, 400, 60]
    yscale: 'linear'
    labels: ['$N_{signal}^{ee}$', 'Entries']
  rpk_unc:
    binning: [7.5, 12.5, 60]
    yscale: 'linear'
    labels: ['$\delta(R_{pK})[\%]$', 'Entries']
  rpk_val:
    binning: [0.0, 10.0, 60]
    yscale: 'linear'
    labels: ['$R_{pK} \times RDM$', 'Entries']
  rpk_err:
    binning: [0.6, 1.4, 60]
    yscale: 'linear'
    labels: ['$\varepsilon($R_{pK}$)$', 'Entries']
# ----------------------------
plugin:
  pulls: 
    rpk_pul : {}
  errors:
    rpk_val :
      color  : green 
      format : '{:.2f}'
      symbol : '\delta'
    rpk_unc :
      color  : green 
      format : '{:.2f}'
      symbol : '\delta'
  stats:
    Valid:
      mean : validity rate={:.1%}
# ----------------------------
summary: 
  median : [] 
  mean   : []
  pulls  : []
