  Pol1 combinatorial ($ee$)    : ee_alt_cmb
  2CB signal ($\mu\mu$)        : mm_alt_sig
  Pol4 combinatorial ($\mu\mu$): mm_alt_cmb
  $p^+K^- J/\psi(\to ee)$      : bts_jpsi_ee
  $p^+K^* J/\psi(\to ee)$      : bts_pKst_ee
