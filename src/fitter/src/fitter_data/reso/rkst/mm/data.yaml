# This is a config file used for tests
# It illustrates how a fit would run for data

trigger          : Hlt2RD_B0ToKpPimMuMu_MVA
output_directory : reso/rkst/muon
yields           : model/yields/rkst/reso_muon.yaml
selection        : {}
observable:
  jpsi:
    name : B_const_mass_M
    range:
      - 4900 
      - 6000
  psi2:
    name : B_const_mass_psi2S_M
    range:
      - 4900 
      - 6000
components:
  comb            : reso/rkst/mm/comb.yaml
  ccbar           : reso/rkst/mm/ccbar.yaml
  lbpkjpsimm      : reso/rkst/mm/lbpkjpsimm_np.yaml
  bsphijpsimm     : reso/rkst/mm/bsphijpsimm_np.yaml
  bskstjpsimm     : reso/rkst/mm/bskstjpsimm.yaml
  bdkstkpijpsimm  : reso/rkst/mm/bdkstkpijpsimm.yaml
  bdkstjpsimm_swp : reso/rkst/mm/bdkstjpsimm_swp_np.yaml
  bdkstkpipsi2mm  : reso/rkst/mm/bdkstkpipsi2mm.yaml
constraints:
  pre_rare: []
fit: {}
plots: # These entries should be taken from https://gitlab.cern.ch/rx_run3/dmu#fit-plotting
  nbins           : 60
  stacked         : True
  d_leg :
    comb           : Combinatorial
    ccbar          : $B_{s,d,u}\to c\bar{c} X$
    lbpkjpsimm     : $\Lambda_b \to J/\psi pK$
    bsphijpsimm    : $B_s \to J/\psi\phi(\to KK)$
    bskstjpsimm    : $B_s\to J/\psi K^{*0}(\to K^+\pi^-)$
    bdkstkpijpsimm : $B^0\to J/\psi K^{*0}(\to K^+\pi^-)$ 
    bdkstjpsimm_swp: $B^0\to J/\psi K^{*0}(\to K^+_{\to\pi^+}\pi^-_{\to K^-})$ 
    bdkstkpipsi2mm : $B^0\to \psi(2S) K^{*0}(\to K^+\pi^-)$ 
  #yrange:
  #  log   : [1.0,  1e5]
  #  linear: [0.0, null]
  #plot_components : ccbar

