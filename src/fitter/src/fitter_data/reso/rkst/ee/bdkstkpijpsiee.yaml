output_directory : reso/rkst/electron
component        : bdkstkpijpsiee 
categories:
  brem_xx1:
    selection :
      brem : nbrem == 1
    model:
      pdfs:
        - dscb
        - gauss
      shared        : 
        - mu
        - sg
      floating      :
        - mu
        - sg
        - ar
        - nr
      reparametrize : {}
      fix           : {}
  brem_xx2:
    selection :
      brem : nbrem == 2
    model:
      pdfs:
        - dscb
        - gauss
      shared        : 
        - mu
        - sg
      floating      :
        - mu
        - sg
        - ar
        - nr
      reparametrize : {}
      fix           : {}
fit:
  strategy  :
    ntries : 10
    pvalue : 0.05
plots: # These entries should be taken from https://gitlab.cern.ch/rx_run3/dmu#fit-plotting
  nbins   : 50
  stacked : True
  d_leg :
    gauss_1 : Gauss 
    dscb_1  : DSCB 
