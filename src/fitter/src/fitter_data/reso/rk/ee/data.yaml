# This is a config file used for tests
# It illustrates how a fit would run for data

trigger          : Hlt2RD_BuToKpEE_MVA
output_directory : reso/rk/electron
yields           : model/yields/rk/reso_electron.yaml
selection        : {}
observable:
  jpsi:
    name : B_const_mass_M
    range:
      - 4800 
      - 7000
  psi2:
    name : B_const_mass_psi2S_M
    range:
      - 4800 
      - 7000
components:
  comb       : reso/rk/ee/comb.yaml
  bppijpsiee : reso/rk/ee/bppijpsiee.yaml
  ccbar      : reso/rk/ee/ccbar.yaml
  bpkpjpsiee : reso/rk/ee/bpkpjpsiee.yaml
  bpkppsi2ee : reso/rk/ee/bpkppsi2ee.yaml
constraints:
  yields : []
fit: {}
plots:
  nbins           : 100
  stacked         : True
  d_leg :
    comb       : Combinatorial
    bppijpsiee : $B^+\to J/\psi(\to e^+e^-)\pi^+$
    ccbar      : $B_{s,d,u}\to c\bar{c} X$
    bpkpjpsiee : $B^+\to J/\psi(\to e^+e^-) K^+$
    bpkppsi2ee : $B^+\to \psi(2S)(\to e^+e^-) K^+$
  #yrange:
  #  log   : [1.0,  1e6]
  #  linear: [0.0, null]
  #plot_components : ccbar
