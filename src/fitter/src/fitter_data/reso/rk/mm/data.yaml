# This is a config file used for tests
# It illustrates how a fit would run for data

trigger          : Hlt2RD_BuToKpMuMu_MVA 
output_directory : reso/rk/mm
yields           : model/yields/rk/reso_muon.yaml
selection        : {}
observable:
  jpsi:
    name : B_const_mass_M
    range:
      - 5000 
      - 6000
  psi2:
    name : B_const_mass_psi2S_M
    range:
      - 5180 
      - 5700
components:
  comb       : reso/rk/mm/comb.yaml
  bppijpsimm : reso/rk/mm/bppijpsimm.yaml
  bpkppsi2mm : reso/rk/mm/bpkppsi2mm.yaml
  bpkpjpsimm : reso/rk/mm/bpkpjpsimm.yaml
constraints:
  pre_rare : []
fit: {}
plots: # These entries should be taken from https://gitlab.cern.ch/rx_run3/dmu#fit-plotting
  nbins           : 100
  stacked         : True
  d_leg :
    bpkpjpsimm    : $B^+\to J/\psi(\to \mu^+\mu^-) K^+$ 
    bppijpsimm    : $B^+\to J/\psi(\to \mu^+\mu^-) \pi^+$ 
    bpkppsi2mm    : $B^+\to \psi(2S)(\to \mu^+\mu^-) K^+$ 
    comb          : Combinatorial
  #plot_components : ccbar
  #yrange:
  #  log   : [1.0,  1e7]
  #  linear: [0.0, null]
