# -------------------------
# Aliases
# -------------------------
cleanup: &cleanup
  jpsi veto  : "TMath::Abs(B_const_mass_M       - 5280) > 200"
  psi2s veto : "TMath::Abs(B_const_mass_psi2S_M - 5280) > 100"
  cmb        : mva_cmb > 0.6 && mva_cmb < 0.9
fit_strat: &fit_strat
  strategy : 
    ntries : 20
    pvalue : 0.05
plot_conf: &plot_conf
  nbins  : 60
  stacked: True
  d_leg  : {}
# -------------------------
constraints_high: &cons_hi
  component  : data_24 
  trigger    : Hlt2RD_BuToKpEE_SameSign_MVA
  parameters : # Will constrain parameters starting
    - mu       # with any of these strings
    - sg       # E.g mu_hypexp_combinatorial_1
  selection  : 
    <<: *cleanup
  fit:
    <<: *fit_strat
  plots:
    <<: *plot_conf
# -------------------------
constraints_low_central: &cons_lc
  component  : data_24 
  trigger    : Hlt2RD_BuToKpEE_SameSign_MVA
  parameters : # Will constrain parameters starting
    - mu       # with any of these strings
    - ap       # E.g mu_hypexp_combinatorial_1
    - bt
  selection  : 
    <<: *cleanup
  fit:
    <<: *fit_strat
  plots:
    <<: *plot_conf
# -------------------------
# Proper config
# -------------------------

# -----------------
constraints:
  low:
    <<: *cons_lc
  central:
    <<: *cons_lc
  high:
    <<: *cons_hi
# -----------------
models:
  low:
    pdfs          : [hypexp]
    shared        : []
    floating      : []
    reparametrize : {}
    fix           : {}
  central:
    pdfs          : [hypexp]
    shared        : []
    floating      : []
    reparametrize : {}
    fix           : {}
  high:
    pdfs          : [suj]
    shared        : []
    floating      : []
    reparametrize : {}
    fix           :
      dl_suj : 2.5
      gm_suj : -10
# -----------------
