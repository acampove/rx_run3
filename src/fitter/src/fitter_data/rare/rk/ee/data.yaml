# This is a config file used for tests
# It illustrates how a fit would run for data

trigger          : Hlt2RD_BuToKpEE_MVA
output_directory : rare/rk/electron/data
yields           : model/yields/rk/rare_electron.yaml
selection        : {}
observable:
  low:
    name : B_Mass_smr
    range:
      - 4500 
      - 6900
  central:
    name : B_Mass_smr
    range:
      - 4600 
      - 6900
  high:
    name : B_Mass_smr
    range:
      - 4500 
      - 6900
components:
  ccbar      : rare/rk/ee/ccbar.yaml
  comb       : rare/rk/ee/comb.yaml
  bdkstkpiee : rare/rk/ee/bdkstkpiee_np.yaml
  bpkstkpiee : rare/rk/ee/bpkstkpiee_np.yaml
  bsphiee    : rare/rk/ee/bsphiee_np.yaml
  bpkpjpsiee : rare/rk/ee/bpkpjpsiee_np.yaml
  bpkppsi2ee : rare/rk/ee/bpkppsi2ee_np.yaml
  bpkkk      : rare/rk/ee/bpkkk_np.yaml
  bpkpipi    : rare/rk/ee/bpkpipi_np.yaml
  bpkpee     : rare/rk/ee/bpkpee.yaml
constraints:
  misid     : misid/rk/ee/data_misid.yaml
  prec_rare :
    - bdkstkpiee
    - bpkstkpiee
    - bsphiee
fit: {}
plots: # These entries should be taken from https://gitlab.cern.ch/rx_run3/dmu#fit-plotting
  nbins   : 30
  stacked : True
  d_leg :
    jpsi_leakage                      : $B^+\to K^+ J/\psi(\to e^+e^-)$ 
    psi2_leakage                      : $B^+\to K^+ \psi(2S)(\to e^+e^-)$ 
    Bd_Kstee_eq_btosllball05_DPC      : $B^+\to K^{*+}(\to K^+\pi^0)e^+e^-$ 
    Bu_Kstee_Kpi0_eq_btosllball05_DPC : $B^0\to K^{*0}(\to K^+\pi^-)e^+e^-$ 
    Bs_phiee_eq_Ball_DPC              : $B_s\to \phi(\to K^+K^-)e^+e^-$ 
    combinatorial                     : Combinatorial
    signal                            : $B^+\to K^+ e^+e^-$ 
    ccbar                             : $B\to c\bar{c}(\to e^+e^-) + X$
    kkk                               : $B^+\to K^+K^+K^-$ 
    kpipi                             : $B^+\to K^+\pi^+\pi^-$ 
