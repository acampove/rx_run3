model: &model
  pdfs :
    - dscb
  fix           : {}
  reparametrize : {}
  shared        :
    - mu
    - sg
  floating      :
    - mu
    - sg

output_directory : rare/rk/electron/signal 
component        : bpkpee
categories:
  brem_xx1_b1: 
    selection : 
      brem : nbrem == 1
      block: block == 1
    model:
      <<: *model
  brem_xx2_b1: 
    selection :
      brem : nbrem == 2
      block: block == 1
    model:
      <<: *model
fit:
  strategy  :
    pvalue : 0.05
    ntries : 10
plots: # These entries should be taken from https://gitlab.cern.ch/rx_run3/dmu#fit-plotting
  nbins   : 30
  stacked : True
  d_leg   : {}
