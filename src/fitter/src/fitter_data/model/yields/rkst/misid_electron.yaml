# This config file defines the yields and the relationships between them
# For misid fits, this will be reused by both Kpipi and KKK regions to get
# the yields

# ------------------
flt_yields: &flt_yields
  val : 1
  min : 0
  max : 10000

cns_yields: &cns_yields
  val : 1
  min : 0
  max : 1000 
  fix : True
# ------------------
yld_comb_bdkk:
  <<: *flt_yields
yld_comb_bdpipi:
  <<: *flt_yields
# ------------------
yld_bdkpipi_bdpipi:
  <<: *flt_yields
yld_bdkkk_bdkk:
  <<: *flt_yields
# ------------------
yld_bdkpipi_bdkk:     # Kpipi yield in KKK region
  <<: *cns_yields
yld_bdkkk_bdpipi:     # KKK yield in Kpipi region
  <<: *cns_yields
