# This config file defines the yields and the relationships between them
# For the fit of the resonant electron channel 
yields: &yields
  val : 10
  min : 0
  max : 1000000
jpsi_fraction:
  val : 0.5
  min : 0.0
  max : 1.0 
psi2_fraction:
  val : 0.5
  min : 0.0
  max : 1.0 
# -------------------------
yld_bdkstjpsiee_swp:
  <<: *yields
yld_lbpkjpsiee:
  <<: *yields
yld_bsphijpsiee:
  <<: *yields
yld_bskstjpsiee:
  <<: *yields
yld_comb:
  <<: *yields
yld_bdkstkpijpsiee:
  <<: *yields
yld_bdkstkpipsi2ee:
  <<: *yields
yld_ccbar:
  <<: *yields
# -------------------------
yld_bdkstkpijpsiee_brem_001:
  kind: mul
  pars: 
    - yld_bdkstkpijpsiee
    - jpsi_fraction
yld_bdkstkpijpsiee_brem_002:
  kind: dif 
  pars:
    - yld_bdkstkpijpsiee
    - yld_bdkstkpijpsiee_brem_001
# -------------------------
yld_bdkstkpipsi2ee_brem_001:
  kind: mul
  pars: 
    - yld_bdkstkpipsi2ee
    - psi2_fraction
yld_bdkstkpipsi2ee_brem_002:
  kind: dif 
  pars:
    - yld_bdkstkpipsi2ee
    - yld_bdkstkpipsi2ee_brem_001 
