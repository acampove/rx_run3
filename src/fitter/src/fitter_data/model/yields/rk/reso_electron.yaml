# This config file defines the yields and the relationships between them
# For the fit of the resonant electron channel 
yields: &yields
  val : 10
  min : 0
  max : 1000000
jpsi_fraction:
  val : 0.5
  min : 0.0
  max : 1.0 
psi2_fraction:
  val : 0.5
  min : 0.0
  max : 1.0 
# -------------------------
yld_bppijpsiee_brem_xx1:
  <<: *yields
yld_ccbar_brem_xx1:
  <<: *yields
yld_comb_brem_xx1:
  <<: *yields
yld_bppijpsiee_brem_xx2:
  <<: *yields
yld_ccbar_brem_xx2:
  <<: *yields
yld_comb_brem_xx2:
  <<: *yields
yld_bpkpjpsiee:
  <<: *yields
yld_bpkppsi2ee:
  <<: *yields
# -------------------------
yld_bpkpjpsiee_brem_xx1:
  kind : mul
  pars : 
    - yld_bpkpjpsiee
    - jpsi_fraction
yld_bpkpjpsiee_brem_xx2:
  kind : dif 
  pars :
    - yld_bpkpjpsiee
    - yld_bpkpjpsiee_brem_xx1
# -------------------------
yld_bpkppsi2ee_brem_xx1:
  kind : mul
  pars : 
    - yld_bpkppsi2ee
    - psi2_fraction
yld_bpkppsi2ee_brem_xx2:
  kind : dif 
  pars :
    - yld_bpkppsi2ee
    - yld_bpkppsi2ee_brem_xx1

