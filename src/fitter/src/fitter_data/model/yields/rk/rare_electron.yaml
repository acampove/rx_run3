# This config file defines the yields and the relationships between them
# For the fit of the rare electron channel 
yields: &yields
  val : 10
  min : 0
  max : 100000
# --------------------
s_bsphiee:
  val : 0.5 
  min : 0.0
  max : 1.0 
# --------------------
s_bdkstkpiee:
  val : 0.5 
  min : 0.0
  max : 1.0 
# --------------------
s_bpkstkpiee:
  val : 0.5 
  min : 0.0
  max : 1.0 
# --------------------
yld_bpkpipi_bppipi:
  <<      : *yields
yld_bpkkk_bpkk:
  <<      : *yields
yld_bpkpee:
  <<      : *yields
# --------------------
yld_bdkstkpiee:
  kind : mul
  pars :
    - s_bdkstkpiee
    - yld_bpkpee
yld_bpkstkpiee:
  kind : mul
  pars :
    - s_bpkstkpiee
    - yld_bpkpee
yld_bsphiee:
  kind : mul
  pars :
    - s_bsphiee
    - yld_bpkpee
# --------------------
yld_bpkpee:
  <<      : *yields
yld_ccbar:
  <<      : *yields
yld_comb:
  <<      : *yields
yld_bpkpjpsiee:
  <<      : *yields
yld_bpkppsi2ee: 
  <<      : *yields
