# This config file defines the yields and the relationships between them
# For the fit of the rare electron channel 
yields: &yields
  val : 0
  min : 0
  max : 100000

yld_kpipi:
  <<      : *yields
yld_kkk:
  <<      : *yields
yld_signal:
  <<      : *yields
yld_bdkstkpiee:
  scl     : [yld_signal]
  preffix : pscale
  <<      : *yields
yld_bpkstkpiee:
  scl     : [yld_signal]
  preffix : pscale
  <<      : *yields
yld_bsphiee:
  scl     : [yld_signal]
  preffix : pscale
  <<      : *yields
yld_ccbar:
  <<      : *yields
yld_combinatorial:
  <<      : *yields
yld_jpsi_leakage:
  <<      : *yields
yld_psi2_leakage: 
  <<      : *yields
