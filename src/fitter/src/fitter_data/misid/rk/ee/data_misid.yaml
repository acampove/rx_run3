# This config is used to control how the data model
# is built for the fit to the misID control regions

output_directory : rare/rk/electron/misid/data
trigger          : Hlt2RD_BuToKpEE_MVA_noPID
yields           : model/yields/rk/misid_electron.yaml
selection:
  bpkk  : (LEP_PID_E < 3.0 || LEP_PROBNN_E < 0.2) && LEP_PROBNN_K > 0.1
  bppipi: (LEP_PID_E < 3.0 || LEP_PROBNN_E < 0.2) && LEP_PROBNN_K < 0.1
observable: {}
components:
  comb   : misid/rk/ee/comb.yaml
  bpkpipi: misid/rk/ee/bpkpipi.yaml
  bpkkk  : misid/rk/ee/bpkkk.yaml
constraints: {}
fit:
  strategy :
    retry :
      ntries : 15
plots: # These entries should be taken from https://gitlab.cern.ch/rx_run3/dmu#fit-plotting
  nbins   : 30
  stacked : True
  d_leg :
    comb    : Combinatorial
    bpkpipi : $B^+\to K^+\pi^-\pi^+$
    bpkkk   : $B^+\to K^+K^-K^+$
